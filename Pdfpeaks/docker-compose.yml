version: '3.8'

services:
  # Main .NET Application
  pdfpeaks:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING:-Server=db;Database=Pdfpeaks;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;}
      - ConnectionStrings__Redis=${REDIS_CONNECTION_STRING:-redis:6379}
      - AzureOpenAI__Endpoint=${AZURE_OPENAI_ENDPOINT}
      - AzureOpenAI__ApiKey=${AZURE_OPENAI_API_KEY}
      - AzureOpenAI__DeploymentId=gpt-4
      - AI__PythonServiceUrl=http://python-ai:8001
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=Pdfpeaks
      - Jwt__Audience=PdfpeaksUsers
    depends_on:
      - db
      - redis
      - python-ai
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Python AI Microservice
  python-ai:
    build:
      context: ./services-python-ai
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - AI_API_KEY=${AI_API_KEY}
      - QDRANT_URL=qdrant
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - HOST=0.0.0.0
      - PORT=8001
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:-YourPassword123!}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - app-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD:-YourPassword123!}" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Qdrant Vector Database (for embeddings)
  qdrant:
    image: qdrant/qdrant:v1.10.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Redis Queue for Background Jobs
  redis-queue:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-queue-data:/data
    networks:
      - app-network
    profiles:
      - jobs
    restart: unless-stopped

  # Celery Worker for Background Processing
  celery-worker:
    build:
      context: ./services-python-ai
      dockerfile: Dockerfile
    command: celery -A main worker --loglevel=info --concurrency=4
    environment:
      - CELERY_BROKER_URL=redis://redis-queue:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-queue:6379/1
    depends_on:
      - redis-queue
      - python-ai
    networks:
      - app-network
    profiles:
      - jobs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - pdfpeaks
      - python-ai
    networks:
      - app-network
    profiles:
      - production
    restart: unless-stopped

volumes:
  sqlserver-data:
  redis-data:
  redis-queue-data:
  qdrant-data:

networks:
  app-network:
    driver: bridge
