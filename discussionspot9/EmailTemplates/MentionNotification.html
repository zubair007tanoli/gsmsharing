<div class="actor-info">
    <div class="actor-avatar">
        <img src="{{ACTOR_AVATAR}}" alt="{{ACTOR_NAME}}" onerror="this.src='{{BASE_URL}}/images/default-avatar.png'">
    </div>
    <div class="actor-content">
        <div class="actor-name">{{ACTOR_NAME}}</div>
        <div class="actor-action">mentioned you in {{ENTITY_TYPE}}</div>
    </div>
</div>

<h3 style="color: #787c7e; font-size: 14px; margin: 0 0 10px 0; font-weight: normal;">
    In: {{POST_TITLE}}
</h3>

<div class="notification-box mention">
    <p style="margin: 0; font-size: 15px; color: #1a1a1b; line-height: 1.6;">
        {{MENTION_CONTENT}}
    </p>
</div>

<a href="{{MENTION_URL}}" class="btn-primary">
    View Mention
</a>

<div class="divider"></div>

<p style="color: #787c7e; font-size: 14px; margin: 0;">
    @ Someone thought you'd be interested in this discussion!
</p>
