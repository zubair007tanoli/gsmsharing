<div class="actor-info">
    <div class="actor-avatar">
        <img src="{{ACTOR_AVATAR}}" alt="{{ACTOR_NAME}}" onerror="this.src='{{BASE_URL}}/images/default-avatar.png'">
    </div>
    <div class="actor-content">
        <div class="actor-name">{{ACTOR_NAME}}</div>
        <div class="actor-action">sent you a message</div>
    </div>
</div>

<div class="notification-box" style="border-left-color: #9c27b0;">
    <h3 style="color: #1a1a1b; font-size: 18px; margin: 0 0 15px 0;">
        💬 New Message
    </h3>
    <p style="margin: 0; font-size: 15px; color: #1a1a1b; line-height: 1.6;">
        {{MESSAGE_PREVIEW}}
    </p>
</div>

<a href="{{CHAT_URL}}" class="btn-primary">
    View Message & Reply
</a>

<div class="divider"></div>

<p style="color: #787c7e; font-size: 14px; margin: 0; text-align: center;">
    💌 Quick replies lead to better connections!
</p>
