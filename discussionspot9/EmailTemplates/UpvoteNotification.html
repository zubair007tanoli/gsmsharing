<div class="actor-info">
    <div class="actor-avatar">
        <img src="{{ACTOR_AVATAR}}" alt="{{ACTOR_NAME}}" onerror="this.src='{{BASE_URL}}/images/default-avatar.png'">
    </div>
    <div class="actor-content">
        <div class="actor-name">{{ACTOR_NAME}}</div>
        <div class="actor-action">upvoted your {{ENTITY_TYPE}}</div>
    </div>
</div>

<div style="text-align: center; margin: 20px 0;">
    <div style="display: inline-block; background: linear-gradient(135deg, #ff4500, #ff6b35); color: white; padding: 20px 30px; border-radius: 12px;">
        <div style="font-size: 48px; margin-bottom: 8px;">⬆️</div>
        <div style="font-size: 16px; font-weight: 600;">Your {{ENTITY_TYPE}} was upvoted!</div>
    </div>
</div>

<h3 style="color: #1a1a1b; font-size: 18px; margin: 20px 0 10px 0;">
    {{ENTITY_TITLE}}
</h3>

<div class="notification-box">
    <p style="margin: 0; font-size: 14px; color: #787c7e;">
        {{ENTITY_PREVIEW}}
    </p>
</div>

<a href="{{ENTITY_URL}}" class="btn-primary">
    View {{ENTITY_TYPE}}
</a>

<div class="divider"></div>

<p style="color: #787c7e; font-size: 14px; margin: 0; text-align: center;">
    ⭐ Keep creating great content - the community loves it!
</p>
