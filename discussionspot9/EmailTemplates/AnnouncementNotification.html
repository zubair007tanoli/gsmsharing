<div style="text-align: center; margin-bottom: 30px;">
    <div style="display: inline-block; background: linear-gradient(135deg, #ff6b6b, #feca57); color: white; padding: 12px 24px; border-radius: 20px; font-weight: 600; font-size: 14px;">
        📢 SITE ANNOUNCEMENT
    </div>
</div>

<h2 style="color: #1a1a1b; font-size: 24px; margin: 0 0 15px 0; text-align: center;">
    {{ANNOUNCEMENT_TITLE}}
</h2>

<div class="notification-box" style="border-left-color: #ff4500; background: #fff8f0;">
    <div style="font-size: 15px; color: #1a1a1b; line-height: 1.7;">
        {{ANNOUNCEMENT_MESSAGE}}
    </div>
</div>

{{#if ANNOUNCEMENT_LINK}}
<div style="text-align: center; margin: 30px 0;">
    <a href="{{ANNOUNCEMENT_LINK}}" class="btn-primary">
        {{ANNOUNCEMENT_LINK_TEXT}}
    </a>
</div>
{{/if}}

<div class="divider"></div>

<p style="color: #787c7e; font-size: 13px; margin: 0; text-align: center;">
    Important updates from the DiscussionSpot team
</p>
