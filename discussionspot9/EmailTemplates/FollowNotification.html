<div class="actor-info">
    <div class="actor-avatar">
        <img src="{{ACTOR_AVATAR}}" alt="{{ACTOR_NAME}}" onerror="this.src='{{BASE_URL}}/images/default-avatar.png'">
    </div>
    <div class="actor-content">
        <div class="actor-name">{{ACTOR_NAME}}</div>
        <div class="actor-action">started following you</div>
    </div>
</div>

<div class="notification-box follow">
    <h3 style="color: #1a1a1b; font-size: 18px; margin: 0 0 15px 0;">
        🎉 You have a new follower!
    </h3>
    <p style="margin: 0 0 10px 0; font-size: 15px; color: #1a1a1b;">
        <strong>{{ACTOR_NAME}}</strong> is now following you on DiscussionSpot.
    </p>
    {{#if ACTOR_BIO}}
    <p style="margin: 10px 0 0 0; font-size: 14px; color: #787c7e; font-style: italic;">
        "{{ACTOR_BIO}}"
    </p>
    {{/if}}
</div>

<a href="{{ACTOR_PROFILE_URL}}" class="btn-primary">
    View {{ACTOR_NAME}}'s Profile
</a>

<div style="text-align: center; margin: 20px 0;">
    <a href="{{FOLLOW_BACK_URL}}" style="display: inline-block; background: transparent; color: #0079d3; padding: 12px 24px; text-decoration: none; border: 2px solid #0079d3; border-radius: 6px; font-weight: 600;">
        Follow Back
    </a>
</div>

<div class="divider"></div>

<p style="color: #787c7e; font-size: 14px; margin: 0; text-align: center;">
    👥 Building connections makes DiscussionSpot better for everyone!
</p>
