<!DOCTYPE html>
<html>
<head>
    <title>Static Files Test</title>
    <link rel="stylesheet" href="/css/site.css">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
            background-color: #f0f0f0; 
        }
        .test-box { 
            background: #007bff; 
            color: white; 
            padding: 20px; 
            border-radius: 5px; 
            margin: 20px 0; 
        }
    </style>
</head>
<body>
    <h1>Static Files Test Page</h1>
    
    <div class="test-box">
        <h2>✅ This page is loading!</h2>
        <p>If you can see this styled box, static files are working correctly.</p>
    </div>
    
    <div class="test-box" style="background: #28a745;">
        <h2>CSS Test</h2>
        <p>This should have green background if CSS is loading properly.</p>
    </div>
    
    <script>
        console.log('JavaScript is working!');
        document.addEventListener('DOMContentLoaded', function() {
            alert('Static files test successful!');
        });
    </script>
</body>
</html>
